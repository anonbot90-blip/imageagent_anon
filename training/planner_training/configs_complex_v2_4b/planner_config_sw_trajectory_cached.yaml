# Planner Training Configuration - Cached Embeddings Mode (SW Trajectory)
# Complex V2 Dataset - 4B Model
# Fine-tune Qwen2.5-VL using pre-computed vision embeddings (3× faster)

model:
  base_model: "Qwen/Qwen3-VL-4B-Instruct"
  dtype: "bfloat16"
  device: "cuda"
  trust_remote_code: true
  freeze_vision_encoder: true  # Vision encoder not needed (using cached embeddings)

data:
  training_data_path: "training_data/complex_v2_cot_4b_trajectory/sw_vision/planner_training_data.json"
  embeddings_path: "training_data/complex_v2_cot_4b_trajectory/sw_vision/embeddings/vision_embeddings.h5"  # HDF5 file with cached embeddings
  train_val_split: 0.9
  batch_size: 1  # Reduced for safety
  shuffle: true
  num_workers: 4

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.05
  bias: "none"

training:
  num_epochs: 3
  learning_rate: 2.0e-5
  warmup_steps: 100
  gradient_accumulation_steps: 8  # 8 GPUs × 1 batch × 8 accum = 64 effective batch
  max_grad_norm: 1.0
  weight_decay: 0.01
  save_steps: 25
  eval_steps: 25
  evaluation_strategy: "steps"
  save_strategy: "steps"
  logging_steps: 10
  max_length: 2048

hardware:
  mixed_precision: "bf16"
  gradient_checkpointing: true
  use_8bit: false
  num_gpus: 8
  gpu_ids: "0,1,2,3,4,5,6,7"

output:
  output_dir: "../../checkpoints/complex_v2_cot_4b_trajectory/vision/sw"
  save_total_limit: 3
  load_best_model_at_end: true

logging:
  use_wandb: false
  wandb_project: "imageagent-planner"
  wandb_run_name: "complex_v2_4b_sw_trajectory_cached"
  log_level: "info"

evaluation:
  metric_for_best_model: "eval_loss"
  greater_is_better: false

