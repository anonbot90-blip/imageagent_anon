# Planner Training Configuration - DPO Trajectory (Text-Only Mode)

model:
  base_model: "Qwen/Qwen3-VL-8B-Instruct"
  dtype: "bfloat16"
  device: "cuda"
  trust_remote_code: true
  freeze_vision_encoder: true

data:
  training_data_path: "../../training_data/complex/cot_8b_trajectory/dpo_text/planner_training_data_dpo.json"
  train_val_split: 0.9
  batch_size: 1
  shuffle: true
  num_workers: 4

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.05
  bias: "none"

training:
  num_epochs: 3
  learning_rate: 2.0e-6
  warmup_steps: 100
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  weight_decay: 0.01
  save_steps: 500
  eval_steps: 500
  evaluation_strategy: "steps"
  save_strategy: "steps"
  logging_steps: 50
  max_length: 2048
  beta: 0.1

hardware:
  mixed_precision: "bf16"
  gradient_checkpointing: true
  use_8bit: false
  num_gpus: 8
  gpu_ids: "0,1,2,3,4,5,6,7"

output:
  output_dir: "../../checkpoints/complex/cot_8b_trajectory/dpo"
  save_total_limit: 3
  load_best_model_at_end: true

evaluation:
  metric_for_best_model: "loss"
  greater_is_better: false

logging:
  use_wandb: false
  wandb_project: "imageagent-planner"
  wandb_run_name: "dpo_trajectory_text"
  log_level: "info"
