evaluation:
  num_samples: 200
  checkpoint_interval: 2
  category: simple
  model_size: 8b
  modality: vision
data:
  results_dir: imageagent_results_10000_cot
  trajectory_dir: training_data/simple/cot_8b_trajectory
  test_samples_file: training_data/simple/cot_8b_trajectory/test_samples_cot_8b.txt
  output_dir: evaluation_results/simple/vision_parallel_cot_8b_trajectory
action_library: actions/action_library_v2.json
models:
  baseline:
    name: Baseline
    checkpoint: Qwen/Qwen3-VL-8B-Instruct
    gpu: 7
    type: pretrained
  edit_only:
    name: Edit-Only
    checkpoint: none
    gpu: 1
    type: edit_only
  standard:
    name: Standard
    checkpoint: checkpoints/simple/cot_8b_trajectory/standard_vision/final
    gpu: 2
    type: finetuned
  rl:
    name: RL
    checkpoint: checkpoints/simple/cot_8b_trajectory/rl_vision/final
    gpu: 3
    type: finetuned
  rw:
    name: RW
    checkpoint: checkpoints/simple/cot_8b_trajectory/rw_vision/final
    gpu: 4
    type: finetuned
  dpo:
    name: DPO
    checkpoint: checkpoints/simple/cot_8b_trajectory/dpo_vision/final
    gpu: 5
    type: finetuned
  sw:
    name: SW
    checkpoint: checkpoints/simple/cot_8b_trajectory/sw_vision/final
    gpu: 6
    type: finetuned
  gpt4o:
    name: GPT-4o
    checkpoint: api
    gpu: null
    type: api
image_editor:
  type: qwen
  checkpoint: Qwen/Qwen-Image-Edit-20B
  config: null
gpt_judge:
  enabled: true
  action_judge: true
  image_judge: true
  azure_endpoint: https://YOUR_AZURE_OPENAI_ENDPOINT.openai.azure.com/
  api_key: ""  # Set via AZURE_OPENAI_API_KEY environment variable (source credentials.sh)
  api_version: 2024-12-01-preview
  model: gpt-4o
  rate_limit_delay: 0.5
reward_model:
  enabled: true
  checkpoint: Qwen/Qwen3-VL-8B-Instruct
